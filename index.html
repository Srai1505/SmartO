<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartO· Shambhavi Rai</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>

/*  VARIABLES */
:root {
  --bg:        #f3f4ff;
  --card:      #ffffff;
  --input-bg:  #f7f8ff;
  --border:    #e2e4f0;
  --text:      #1a1a2e;
  --text2:     #5b5e7a;
  --text3:     #9498b8;
  --accent:    #6366f1;
  --accent2:   #4f46e5;
  --acc-bg:    rgba(99,102,241,0.10);
  --green:     #10b981;
  --green-bg:  #ecfdf5;
  --amber:     #f59e0b;
  --amber-bg:  #fffbeb;
  --red:       #ef4444;
  --red-bg:    #fef2f2;
  --shadow:    0 2px 12px rgba(99,102,241,0.10);
  --shadow2:   0 6px 28px rgba(99,102,241,0.15);
  --r:  12px;
  --r2: 18px;
  --r3: 999px;
}
.dark {
  --bg:       #0e0e1a;
  --card:     #18182c;
  --input-bg: #22223a;
  --border:   #2e2e50;
  --text:     #eeeef8;
  --text2:    #9898c0;
  --text3:    #5a5a80;
  --acc-bg:   rgba(99,102,241,0.18);
  --green-bg: #052e1c;
  --amber-bg: #2d1e00;
  --red-bg:   #2d0707;
  --shadow:   0 2px 12px rgba(0,0,0,0.40);
  --shadow2:  0 6px 28px rgba(0,0,0,0.55);
}

/*RESET*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;line-height:1.6}
ul{list-style:none}
button,input,select,textarea{font-family:'Nunito',sans-serif}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/*HEADER*/
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;
  background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);transition:background .3s,border-color .3s;
}
.hdr-brand{display:flex;align-items:center;gap:11px}
.hdr-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#fff;flex-shrink:0;
}
.hdr-name{font-size:18px;font-weight:900;letter-spacing:-.3px}

.hdr-by{font-size:11px;color:var(--text3);font-weight:600}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-date{font-size:12px;color:var(--text3);font-weight:700}
.theme-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--input-bg);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.theme-btn:hover{border-color:var(--accent);transform:scale(1.1)}

/* PAGE*/
.page{max-width:760px;margin:0 auto;padding:28px 20px 80px;display:flex;flex-direction:column;gap:22px}

/* GREETING + RING */
.top-box{
  background:linear-gradient(135deg,#6366f1 0%,#a78bfa 100%);
  border-radius:var(--r2);padding:28px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  color:#fff;position:relative;overflow:hidden;
}
.top-box::after{
  content:'';position:absolute;top:-50px;right:-50px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(255,255,255,.06);pointer-events:none;
}
.greet-title{font-size:clamp(20px,4vw,30px);font-weight:900;margin-bottom:5px;line-height:1.2}
.greet-title em{color:#fde68a;font-style:normal}
.greet-sub{font-size:14px;color:rgba(255,255,255,.82);font-weight:600}
.ring-wrap{position:relative;width:78px;height:78px;flex-shrink:0;z-index:1}
.ring-svg{width:78px;height:78px;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:6}
.ring-fg{fill:none;stroke:#fde68a;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:15px;font-weight:900;color:#fff;line-height:1}
.ring-lbl{font-size:9px;color:rgba(255,255,255,.7);font-weight:800;text-transform:uppercase;letter-spacing:.5px}

/* STATS  */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:var(--shadow);transition:transform .2s,background .3s;
}
.stat:hover{transform:translateY(-3px)}
.stat-n{font-size:30px;font-weight:900;color:var(--accent);line-height:1}
.stat.g .stat-n{color:var(--green)}
.stat.y .stat-n{color:var(--amber)}
.stat.r .stat-n{color:var(--red)}
.stat-k{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text3)}

/* ADD FORM*/
.add-box{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);
  padding:20px;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s,background .3s;
}
.add-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-bg),var(--shadow)}
.add-box h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:14px}

.add-row{display:flex;gap:10px;margin-bottom:14px}

/* THE INPUT */
.task-field{
  flex:1;
  background:var(--input-bg);
  border:2px solid var(--border);
  border-radius:var(--r);
  padding:13px 16px;
  font-size:15px;font-weight:700;
  color:var(--text);
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.task-field::placeholder{color:var(--text3);font-weight:400}
.task-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-bg)}

/* THE ADD BUTTON */
.add-btn{
  display:flex;align-items:center;gap:8px;
  padding:13px 24px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--r);
  font-size:15px;font-weight:900;
  cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(99,102,241,0.35);
}
.add-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,0.45)}
.add-btn:active{transform:translateY(0)}

.meta-row{display:flex;gap:12px;flex-wrap:wrap}
.meta-grp{display:flex;flex-direction:column;gap:4px;min-width:110px}
.meta-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text3)}
.meta-sel,.meta-in{
  background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--r);
  padding:9px 12px;font-size:13px;font-weight:700;color:var(--text2);
  outline:none;cursor:pointer;transition:border-color .2s;
}
.meta-sel option{background:var(--card);color:var(--text)}
.meta-in::placeholder{color:var(--text3);font-weight:400}
.meta-sel:focus,.meta-in:focus{border-color:var(--accent)}
.meta-in[type="date"]::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}

/* SEARCH */
.search-wrap{position:relative;display:flex;align-items:center}
.search-ico{position:absolute;left:14px;font-size:14px;pointer-events:none;z-index:1}
.search-field{
  width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r3);
  padding:11px 42px;font-size:14px;font-weight:600;color:var(--text);
  outline:none;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s;
}
.search-field::placeholder{color:var(--text3);font-weight:400}
.search-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--acc-bg)}
.search-x{
  position:absolute;right:13px;background:none;border:none;
  color:var(--text3);font-size:13px;cursor:pointer;padding:4px;
  border-radius:6px;display:none;transition:color .2s;
}
.search-x:hover{color:var(--text)}
.search-x.show{display:block}

/*FILTER TABS */
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r3);
  font-size:13px;font-weight:800;color:var(--text2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  box-shadow:var(--shadow);transition:all .2s;
}
.tab:hover{border-color:var(--accent);color:var(--accent);background:var(--acc-bg)}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.tab-n{
  background:rgba(0,0,0,.13);border-radius:var(--r3);
  padding:1px 8px;font-size:11px;font-weight:900;
}
.tab:not(.on) .tab-n{background:var(--border);color:var(--text3)}

/*LIST HEADER*/
.list-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.list-title{font-size:16px;font-weight:900}
.drag-hint{font-size:11px;color:var(--text3);font-weight:600;margin-top:-8px}
.clear-done-btn{
  padding:7px 14px;background:transparent;border:1.5px solid var(--border);
  border-radius:var(--r);font-size:12px;font-weight:800;color:var(--text3);
  cursor:pointer;transition:all .2s;
}
.clear-done-btn:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* TASK LIST*/
.task-list{display:flex;flex-direction:column;gap:10px}

/*TASK ITEM*/
.item{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--card);border:1.5px solid var(--border);border-left:4px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  transition:box-shadow .18s,border-color .18s,opacity .18s,background .3s;
  animation:slideIn .22s ease both;
  position:relative;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
.item:hover{box-shadow:var(--shadow2);border-color:var(--border)}
.item[data-p="high"]{border-left-color:var(--red)}
.item[data-p="medium"]{border-left-color:var(--amber)}
.item[data-p="low"]{border-left-color:var(--green)}
.item.done{opacity:.52}
.item.done .item-text{text-decoration:line-through;color:var(--text3)}
.item.dragging{opacity:.25;transform:rotate(1deg);z-index:50}
.item.drag-over{border-top:3px dashed var(--accent);padding-top:11px}

/* grip */
.grip{color:var(--border);font-size:16px;cursor:grab;flex-shrink:0;padding-top:2px;line-height:1;transition:color .15s;user-select:none}
.item:hover .grip{color:var(--text3)}
.grip:active{cursor:grabbing}

/* checkbox */
.cb{
  width:22px;height:22px;border:2px solid var(--border);border-radius:7px;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:transparent;margin-top:1px;transition:all .18s;
}
.cb:hover{border-color:var(--accent);background:var(--acc-bg);transform:scale(1.1)}
.cb.on{background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(99,102,241,.35)}
.cb.on::after{content:'✓';color:#fff;font-size:13px;font-weight:900}

/* body */
.item-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.item-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;word-break:break-word}
.item-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px}

/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--r3);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.b-high{background:var(--red-bg);color:var(--red)}
.b-medium{background:var(--amber-bg);color:var(--amber)}
.b-low{background:var(--green-bg);color:var(--green)}
.b-date{background:var(--acc-bg);color:var(--accent);text-transform:none;font-size:11px;font-weight:700}
.b-date.late{background:var(--red-bg);color:var(--red)}
.b-tag{background:var(--border);color:var(--text2);text-transform:none;font-size:11px;font-weight:700}
.item-notes{font-size:12px;color:var(--text2);font-style:italic}

/* actions */
.item-acts{display:flex;gap:5px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item:hover .item-acts{opacity:1}
.act{
  width:30px;height:30px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--input-bg);color:var(--text3);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.act:hover{transform:scale(1.12)}
.act.edit:hover{background:var(--acc-bg);border-color:var(--accent);color:var(--accent)}
.act.del:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
@media(max-width:480px){.item-acts{opacity:1}}

/* EMPTY STATE*/
.empty{display:none;text-align:center;padding:60px 20px;flex-direction:column;align-items:center;gap:8px}
.empty.show{display:flex}
.empty-ico{font-size:52px;opacity:.35}
.empty-h{font-size:18px;font-weight:800;color:var(--text2)}
.empty-p{font-size:14px;color:var(--text3)}

/*MODAL*/
.modal{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.modal-box{
  position:relative;z-index:1;background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r2);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow2);animation:popIn .2s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:17px;font-weight:900}
.modal-x{
  width:30px;height:30px;background:var(--input-bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text3);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-x:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.f-lbl{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:5px}
.modal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.notes-ta{
  width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--r);
  padding:10px 14px;font-size:14px;font-weight:600;color:var(--text);
  resize:vertical;min-height:76px;outline:none;font-family:'Nunito',sans-serif;transition:border-color .2s;
}
.notes-ta::placeholder{color:var(--text3);font-weight:400}
.notes-ta:focus{border-color:var(--accent)}
.modal-ftr{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px 20px;border-top:1px solid var(--border)}
.btn-cancel{padding:11px 20px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:800;color:var(--text2);cursor:pointer;transition:all .2s}
.btn-cancel:hover{background:var(--border)}
.btn-save{padding:11px 22px;background:var(--accent);border:none;border-radius:var(--r);font-size:14px;font-weight:900;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(99,102,241,.35)}
.btn-save:hover{background:var(--accent2);transform:translateY(-1px)}

/*TOAST*/
#toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--text);color:var(--bg);
  padding:12px 24px;border-radius:var(--r3);
  font-size:14px;font-weight:800;z-index:999;
  opacity:0;pointer-events:none;transition:all .25s ease;
  white-space:nowrap;box-shadow:var(--shadow2);max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOOTER */
.footer{text-align:center;padding:26px 20px;font-size:13px;color:var(--text3);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.footer-links{display:flex;justify-content:center;gap:14px}
.footer-links a{font-size:12px;color:var(--text3);font-weight:700;transition:color .2s}
.footer-links a:hover{color:var(--accent);text-decoration:none}

/*UTILITY */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s ease!important;border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(239,68,68,.15)!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/*RESPONSIVE */
@media(max-width:640px){
  .hdr{padding:0 16px}
  .hdr-by,.hdr-date{display:none}
  .page{padding:18px 14px 60px;gap:16px}
  .top-box{padding:22px 18px}
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-n{font-size:26px}
  .add-row{flex-direction:column}
  .add-btn{width:100%;justify-content:center}
  .task-field{width:100%}
  .meta-row{flex-direction:column}
  .meta-grp{min-width:unset;width:100%}
  .meta-sel,.meta-in{width:100%}
  .tabs{gap:6px}
  .tab{padding:8px 13px;font-size:12px}
  .modal-grid{grid-template-columns:1fr}
  .modal-hdr,.modal-body,.modal-ftr{padding-left:16px;padding-right:16px}
}
@media(max-width:380px){
  .greet-title{font-size:19px}
  .tab{padding:7px 11px;font-size:11px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">✦</div>
    <div>
      <div class="hdr-name">SmartO</div>
      
      <div class="hdr-by">by Shambhavi Rai</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="hdr-date" id="hdrDate"></span>
    <button type="button" id="themeBtn" class="theme-btn" title="Toggle theme">🌙</button>
  </div>
</header>

<!-- PAGE -->
<div class="page">

  <!-- GREETING + RING -->
  <div class="top-box">
    <div>
    
      <h1 class="greet-title">Hey, <em>Shambhavi</em> 👋</h1>
      <p class="greet-sub" id="greetSub">Ready to crush your tasks?</p>
    </div>
    <div class="ring-wrap" aria-label="Progress">
      <svg class="ring-svg" viewBox="0 0 72 72">
        <circle class="ring-track" cx="36" cy="36" r="28"/>
        <circle class="ring-fg" id="ringFg" cx="36" cy="36" r="28"
          stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
      </svg>
      <div class="ring-text">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-lbl">done</span>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><span class="stat-n" id="sTotal">0</span><span class="stat-k">Total</span></div>
    <div class="stat g"><span class="stat-n" id="sDone">0</span><span class="stat-k">Done</span></div>
    <div class="stat y"><span class="stat-n" id="sPend">0</span><span class="stat-k">Pending</span></div>
    <div class="stat r"><span class="stat-n" id="sUrg">0</span><span class="stat-k">Urgent</span></div>
  </div>

  <!-- ADD TASK -->
  <div class="add-box">
    <h2>Add New Task</h2>
    <div class="add-row">
      <input type="text" id="taskInput" class="task-field"
        placeholder="What needs to be done?" maxlength="150" autocomplete="off" />
      <button type="button" id="addBtn" class="add-btn">＋ Add Task</button>
    </div>
    <div class="meta-row">
      <div class="meta-grp">
        <label class="meta-lbl" for="priSel">Priority</label>
        <select id="priSel" class="meta-sel">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>
      <div class="meta-grp">
        <label class="meta-lbl" for="dateSel">Due Date</label>
        <input type="date" id="dateSel" class="meta-in" />
      </div>
      <div class="meta-grp">
        <label class="meta-lbl" for="tagSel">Tag</label>
        <input type="text" id="tagSel" class="meta-in" placeholder="e.g. school" maxlength="15" />
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" class="search-field" placeholder="Search tasks…" />
    <button type="button" id="searchX" class="search-x" title="Clear">✕</button>
  </div>

  <!-- FILTERS -->
  <div class="tabs" role="tablist">
    <button type="button" class="tab on" data-f="all">All <span class="tab-n" id="cAll">0</span></button>
    <button type="button" class="tab" data-f="active">Active <span class="tab-n" id="cActive">0</span></button>
    <button type="button" class="tab" data-f="done">Done <span class="tab-n" id="cDone">0</span></button>
    <button type="button" class="tab" data-f="high">🔴 Urgent <span class="tab-n" id="cHigh">0</span></button>
  </div>

  <!-- LIST -->
  <div>
    <div class="list-hdr">
      <h2 class="list-title" id="listTitle">All Tasks</h2>
      <button type="button" id="clearDoneBtn" class="clear-done-btn">🗑 Clear Done</button>
    </div>
    <p class="drag-hint">⠿ Drag tasks to reorder</p>
    <br/>
    <ul id="taskList" class="task-list"></ul>
    <div id="emptyState" class="empty">
      <div class="empty-ico">📋</div>
      <p class="empty-h">No tasks here!</p>
      <p class="empty-p">Add one above to get started.</p>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-bg" id="modalBg"></div>
  <div class="modal-box">
    <div class="modal-hdr">
      <h3>Edit Task</h3>
      <button type="button" class="modal-x" id="modalX">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="f-lbl">Task Name</label>
        <input type="text" id="eText" class="task-field" style="width:100%" maxlength="150" />
      </div>
      <div class="modal-grid">
        <div>
          <label class="f-lbl">Priority</label>
          <select id="ePri" class="meta-sel" style="width:100%">
            <option value="low">🟢 Low</option>
            <option value="medium">🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div>
          <label class="f-lbl">Due Date</label>
          <input type="date" id="eDate" class="meta-in" style="width:100%" />
        </div>
        <div>
          <label class="f-lbl">Tag</label>
          <input type="text" id="eTag" class="meta-in" style="width:100%" placeholder="e.g. work" maxlength="15" />
        </div>
      </div>
      <div>
        <label class="f-lbl">Notes</label>
        <textarea id="eNotes" class="notes-ta" rows="3" placeholder="Optional notes…"></textarea>
      </div>
    </div>
    <div class="modal-ftr">
      <button type="button" class="btn-cancel" id="modalCancel">Cancel</button>
      <button type="button" class="btn-save" id="modalSave">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!--JAVASCRIPT-->
<script>

// Storage keys
var KEY  = 'smartodo_v6';
var TKEY = 'smartodo_v6_theme';

function loadTasks() {
  try { var d = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(d) ? d : []; }
  catch(e) { return []; }
}
function saveTasks(arr) {
  try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e) {}
}
function loadTheme() { return localStorage.getItem(TKEY) || 'light'; }
function saveTheme(t) { try { localStorage.setItem(TKEY, t); } catch(e) {} }

//StatE
var tasks   = loadTasks();
var filter  = 'all';
var q       = '';
var editId  = null;
var dragSrc = null;

//  Apply theme immediately 
if (loadTheme() === 'dark') document.body.classList.add('dark');
document.getElementById('themeBtn').textContent = loadTheme() === 'dark' ? '☀️' : '🌙';

//Helpers    
function uid() { return 'T' + Date.now() + Math.random().toString(36).slice(2,6); }

function safe(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtDate(s) {
  if (!s) return null;
  var d = new Date(s + 'T00:00:00');
  var now = new Date(); now.setHours(0,0,0,0);
  var tmr = new Date(now); tmr.setDate(now.getDate()+1);
  if (+d===+now) return {t:'📅 Today', late:false};
  if (+d===+tmr) return {t:'📅 Tomorrow', late:false};
  if (d<now)     return {t:'⚠️ Overdue · '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), late:true};
  return {t:'📅 '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), late:false};
}

function fmtTag(t) {
  if (!t||!t.trim()) return '';
  t = t.trim();
  return t[0]==='#' ? t : '#'+t;
}

//Toast
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2600);
}

//Date in header
function setDate() {
  document.getElementById('hdrDate').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
setDate();
setInterval(setDate, 60000);

//Theme
document.getElementById('themeBtn').addEventListener('click', function() {
  var dark = document.body.classList.toggle('dark');
  this.textContent = dark ? '☀️' : '🌙';
  saveTheme(dark ? 'dark' : 'light');
  toast(dark ? '🌙 Dark mode on' : '☀️ Light mode on');
});

//Stats & ring
function updateStats() {
  var total=tasks.length, done=0, urgent=0, highAll=0;
  tasks.forEach(function(t){
    if(t.done) done++;
    if(t.priority==='high'){ highAll++; if(!t.done) urgent++; }
  });
  var pend = total - done;
  var pct  = total > 0 ? Math.round(done/total*100) : 0;

  document.getElementById('sTotal').textContent = total;
  document.getElementById('sDone').textContent  = done;
  document.getElementById('sPend').textContent  = pend;
  document.getElementById('sUrg').textContent   = urgent;
  document.getElementById('cAll').textContent   = total;
  document.getElementById('cActive').textContent= pend;
  document.getElementById('cDone').textContent  = done;
  document.getElementById('cHigh').textContent  = highAll;

  var circ = 175.9;
  document.getElementById('ringFg').style.strokeDashoffset = circ - (pct/100)*circ;
  document.getElementById('ringPct').textContent = pct+'%';

  var sub = document.getElementById('greetSub');
  if (!total)        sub.textContent = 'Ready to crush your tasks?';
  else if(done===total) sub.textContent = '🎉 All done! Amazing work.';
  else { var l=total-done; sub.textContent = l+' task'+(l>1?'s':'')+' left — keep going!'; }
}

//Filter
var TITLES = {all:'All Tasks',active:'Active Tasks',done:'Completed',high:'Urgent Tasks'};

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('on', b.dataset.f===f);
  });
  document.getElementById('listTitle').textContent = TITLES[f]||'Tasks';
  renderList();
}

function visible() {
  var list = tasks.slice();
  if (filter==='active') list = list.filter(function(t){ return !t.done; });
  if (filter==='done')   list = list.filter(function(t){ return  t.done; });
  if (filter==='high')   list = list.filter(function(t){ return t.priority==='high'; });
  var sq = q.trim().toLowerCase();
  if (sq) list = list.filter(function(t){
    return t.text.toLowerCase().indexOf(sq)!==-1 ||
           (t.tag   && t.tag.toLowerCase().indexOf(sq)!==-1) ||
           (t.notes && t.notes.toLowerCase().indexOf(sq)!==-1);
  });
  return list;
}

//Render
function renderAll() { updateStats(); renderList(); }

function renderList() {
  var ul   = document.getElementById('taskList');
  var emp  = document.getElementById('emptyState');
  var list = visible();
  ul.innerHTML = '';
  if (!list.length) { emp.classList.add('show'); return; }
  emp.classList.remove('show');
  list.forEach(function(t){ ul.appendChild(makeItem(t)); });
}

//Build task element
function makeItem(t) {
  var li = document.createElement('li');
  li.className = 'item'+(t.done?' done':'');
  li.setAttribute('data-id', t.id);
  li.setAttribute('data-p', t.priority||'medium');
  li.draggable = true;

  var di = fmtDate(t.dueDate);
  var tg = fmtTag(t.tag);

  li.innerHTML =
    '<span class="grip" title="Drag to reorder">⠿</span>'+
    '<div class="cb'+(t.done?' on':'')+'" tabindex="0" role="checkbox" aria-checked="'+t.done+'"></div>'+
    '<div class="item-body">'+
      '<p class="item-text">'+safe(t.text)+'</p>'+
      '<div class="item-meta">'+
        '<span class="badge b-'+t.priority+'">'+t.priority+'</span>'+
        (di?'<span class="badge b-date'+(di.late?' late':'')+'">'+(di.t)+'</span>':'')+
        (tg?'<span class="badge b-tag">'+safe(tg)+'</span>':'')+
      '</div>'+
      (t.notes?'<p class="item-notes">'+safe(t.notes)+'</p>':'')+
    '</div>'+
    '<div class="item-acts">'+
      '<button type="button" class="act edit" title="Edit">✏️</button>'+
      '<button type="button" class="act del"  title="Delete">🗑️</button>'+
    '</div>';

  // checkbox
  var cb = li.querySelector('.cb');
  function doToggle() {
    t.done = !t.done;
    saveTasks(tasks);
    renderAll();
    toast(t.done ? '✅ Done! Great work.' : '↩️ Moved back to active');
  }
  cb.addEventListener('click', doToggle);
  cb.addEventListener('keydown', function(e){ if(e.key===' '||e.key==='Enter'){e.preventDefault();doToggle();} });

  // edit
  li.querySelector('.act.edit').addEventListener('click', function(e){
    e.stopPropagation(); openEdit(t.id);
  });

  // delete
  li.querySelector('.act.del').addEventListener('click', function(e){
    e.stopPropagation();
    li.style.transition='opacity .22s,transform .22s';
    li.style.opacity='0'; li.style.transform='translateX(44px)';
    setTimeout(function(){
      tasks = tasks.filter(function(x){ return x.id!==t.id; });
      saveTasks(tasks); renderAll(); toast('🗑️ Task deleted');
    }, 230);
  });

  // drag
  li.addEventListener('dragstart', function(e){
    dragSrc=li; li.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  li.addEventListener('dragend', function(){
    li.classList.remove('dragging');
    document.querySelectorAll('.item').forEach(function(el){ el.classList.remove('drag-over'); });
    dragSrc=null;
  });
  li.addEventListener('dragover', function(e){ e.preventDefault(); });
  li.addEventListener('dragenter', function(e){ e.preventDefault(); if(dragSrc&&li!==dragSrc) li.classList.add('drag-over'); });
  li.addEventListener('dragleave', function(e){ if(!li.contains(e.relatedTarget)) li.classList.remove('drag-over'); });
  li.addEventListener('drop', function(e){
    e.stopPropagation(); e.preventDefault();
    if(!dragSrc||dragSrc===li) return;
    li.classList.remove('drag-over');
    var all=[].slice.call(document.querySelectorAll('#taskList .item'));
    if(all.indexOf(dragSrc)<all.indexOf(li)) li.after(dragSrc); else li.before(dragSrc);
    var order=[].slice.call(document.querySelectorAll('#taskList .item')).map(function(el){ return el.getAttribute('data-id'); });
    var map={}; tasks.forEach(function(x){ map[x.id]=x; });
    var vis=order.map(function(id){ return map[id]; }).filter(Boolean);
    var inV={}; order.forEach(function(id){ inV[id]=true; });
    var hid=tasks.filter(function(x){ return !inV[x.id]; });
    tasks=vis.concat(hid); saveTasks(tasks); updateStats();
  });

  return li;
}

//ADD TASK
function addTask() {
  var inp  = document.getElementById('taskInput');
  var text = inp.value.trim();

  if (!text) {
    inp.classList.add('shake');
    setTimeout(function(){ inp.classList.remove('shake'); }, 350);
    inp.focus();
    toast('⚠️ Please type a task first!');
    return;
  }

  var task = {
    id:       uid(),
    text:     text,
    priority: document.getElementById('priSel').value || 'medium',
    dueDate:  document.getElementById('dateSel').value || '',
    tag:      document.getElementById('tagSel').value.trim() || '',
    notes:    '',
    done:     false
  };

  tasks.unshift(task);
  saveTasks(tasks);

  inp.value = '';
  document.getElementById('dateSel').value = '';
  document.getElementById('tagSel').value  = '';
  document.getElementById('priSel').value  = 'medium';
  inp.focus();

  renderAll();
  toast('✅ Task added!');
}

//EDIT MODAL
function openEdit(id) {
  var t = null;
  for(var i=0;i<tasks.length;i++){ if(tasks[i].id===id){ t=tasks[i]; break; } }
  if(!t) return;
  editId = id;
  document.getElementById('eText').value  = t.text;
  document.getElementById('ePri').value   = t.priority;
  document.getElementById('eDate').value  = t.dueDate||'';
  document.getElementById('eTag').value   = t.tag||'';
  document.getElementById('eNotes').value = t.notes||'';
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){ var e=document.getElementById('eText'); e.focus(); e.select(); }, 60);
}

function closeEdit() { document.getElementById('modal').classList.remove('open'); editId=null; }

function saveEdit() {
  if(!editId) return;
  var text = document.getElementById('eText').value.trim();
  if(!text){
    var f=document.getElementById('eText');
    f.classList.add('shake'); setTimeout(function(){ f.classList.remove('shake'); },350);
    toast('⚠️ Task name cannot be empty!'); f.focus(); return;
  }
  for(var i=0;i<tasks.length;i++){
    if(tasks[i].id===editId){
      tasks[i].text     = text;
      tasks[i].priority = document.getElementById('ePri').value;
      tasks[i].dueDate  = document.getElementById('eDate').value;
      tasks[i].tag      = document.getElementById('eTag').value.trim();
      tasks[i].notes    = document.getElementById('eNotes').value.trim();
      break;
    }
  }
  saveTasks(tasks); closeEdit(); renderAll(); toast('✏️ Task updated!');
}

//WIRE ALL EVENTS
document.getElementById('addBtn').addEventListener('click', addTask);

document.getElementById('taskInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') addTask();
});

document.getElementById('searchInput').addEventListener('input', function(){
  q = this.value;
  document.getElementById('searchX').classList.toggle('show', !!q);
  renderList();
});

document.getElementById('searchX').addEventListener('click', function(){
  document.getElementById('searchInput').value=''; q='';
  this.classList.remove('show');
  document.getElementById('searchInput').focus();
  renderList();
});

document.querySelectorAll('.tab').forEach(function(btn){
  btn.addEventListener('click', function(){ setFilter(btn.dataset.f); });
});

document.getElementById('clearDoneBtn').addEventListener('click', function(){
  var n=tasks.filter(function(t){ return t.done; }).length;
  if(!n){ toast('No completed tasks to clear'); return; }
  tasks=tasks.filter(function(t){ return !t.done; });
  saveTasks(tasks); renderAll(); toast('🧹 Cleared '+n+' done task'+(n>1?'s':''));
});

document.getElementById('modalSave').addEventListener('click', saveEdit);
document.getElementById('modalCancel').addEventListener('click', closeEdit);
document.getElementById('modalX').addEventListener('click', closeEdit);
document.getElementById('modalBg').addEventListener('click', closeEdit);

document.addEventListener('keydown', function(e){
  if(e.key==='Escape') closeEdit();
  if(e.key==='Enter' && document.getElementById('modal').classList.contains('open') &&
     document.activeElement!==document.getElementById('eNotes')){ e.preventDefault(); saveEdit(); }
});

//SEED
function seed() {
  var now=new Date(), d2=new Date(now), d6=new Date(now), dp=new Date(now);
  d2.setDate(now.getDate()+2); d6.setDate(now.getDate()+6); dp.setDate(now.getDate()-1);
  return [
    {id:uid(),text:'👋 Welcome! Click the checkbox to mark this done.',priority:'low',dueDate:'',tag:'intro',notes:'Try: ✏️ edit · 🗑️ delete · ⠿ drag · filter tabs · search · dark mode',done:false},
    {id:uid(),text:'Submit final assignment before the deadline',priority:'high',dueDate:d2.toISOString().slice(0,10),tag:'school',notes:'Review all sections first.',done:false},
    {id:uid(),text:'Build a portfolio project in React',priority:'medium',dueDate:d6.toISOString().slice(0,10),tag:'dev',notes:'',done:false},
    {id:uid(),text:'Read JavaScript: The Good Parts',priority:'low',dueDate:'',tag:'reading',notes:'',done:true},
    {id:uid(),text:'Update LinkedIn and portfolio',priority:'medium',dueDate:dp.toISOString().slice(0,10),tag:'career',notes:'',done:false}
  ];
}

//BOOT
if (!tasks.length) { tasks = seed(); saveTasks(tasks); }
renderAll();
document.getElementById('taskInput').focus();
</script>
